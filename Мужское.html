        <script type="module">
    import PhotoSwipe from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.min.js';

    document.addEventListener('DOMContentLoaded', function() {
        
        // Находим все ссылки на картинки
        const links = document.querySelectorAll('.card a');
        
        // Создаем массив с данными о картинках
        const items = Array.from(links).map(link => {
            const img = link.querySelector('img');
            if (!img) return null;
            
            // Получаем реальные размеры из data-атрибутов
            const width = link.dataset.pswpWidth || 1000;
            const height = link.dataset.pswpHeight || 800;
            
            return {
                src: link.href,
                width: parseInt(width),
                height: parseInt(height),
                alt: img.alt,
                thumbnailSrc: img.src
            };
        }).filter(item => item !== null);

        // Назначаем обработчик клика
        links.forEach((link, index) => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Создаем новый экземпляр PhotoSwipe
                const pswp = new PhotoSwipe({
                    dataSource: items,
                    index: index,
                    bgOpacity: 0.9,
                    showHideAnimationType: 'fade',
                    closeOnClick: true,
                    wheelToZoom: true,
                    
                    // Важно: настройка для правильного отображения
                    imageScaleMode: 'fit', // 'fit' - вписать, 'fill' - заполнить
                    imageScaleModeSecondary: 'fit',
                    initialZoomLevel: 'fit',
                    secondaryZoomLevel: 1.5,
                    maxZoomLevel: 3,
                });

                pswp.init();
            });
        });
    });
</script>

        <script>
            // Для работы dropdown на мобильных устройствах
            document.addEventListener('DOMContentLoaded', function() {
                const dropdowns = document.querySelectorAll('.dropdown');
                
                dropdowns.forEach(dropdown => {
                    const toggle = dropdown.querySelector('.dropdown-toggle');
                    
                    toggle.addEventListener('click', function(e) {
                        // Проверяем, что это мобильное устройство
                        if (window.innerWidth <= 768) {
                            e.preventDefault();
                            // Закрываем другие открытые dropdown
                            dropdowns.forEach(d => {
                                if (d !== dropdown) {
                                    d.classList.remove('active');
                                }
                            });
                            // Переключаем текущий
                            dropdown.classList.toggle('active');
                        }
                    });
                });
                
                // Закрываем dropdown при клике вне его
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.dropdown')) {
                        dropdowns.forEach(dropdown => {
                            dropdown.classList.remove('active');
                        });
                    }
                });
            });
        </script>


        <script>
            // Управление dropdown на мобильных устройствах
            document.addEventListener('DOMContentLoaded', function() {
                const dropdowns = document.querySelectorAll('.dropdown');
                
                // Для мобильных устройств - открытие по клику
                if (window.innerWidth <= 768) {
                    dropdowns.forEach(dropdown => {
                        const toggle = dropdown.querySelector('.dropdown-toggle');
                        
                        toggle.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            
                            // Закрываем другие dropdown
                            dropdowns.forEach(d => {
                                if (d !== dropdown) {
                                    d.classList.remove('active');
                                }
                            });
                            
                            // Переключаем текущий
                            dropdown.classList.toggle('active');
                        });
                    });
                    
                    // Закрываем при клике вне dropdown
                    document.addEventListener('click', function(e) {
                        if (!e.target.closest('.dropdown')) {
                            dropdowns.forEach(d => dropdown.classList.remove('active'));
                        }
                    });
                }
            });
        </script>

        <script>
            // Управление кнопками прокрутки
            document.addEventListener('DOMContentLoaded', function() {
                const scrollToTopBtn = document.getElementById('scrollToTop');
                const socialBtn = document.getElementById('socialButton');
                
                // Функция для проверки позиции скролла
                function checkScrollPosition() {
                    // Показываем кнопки после прокрутки на 300px
                    if (window.scrollY > 300) {
                        scrollToTopBtn.classList.add('show');
                        socialBtn.classList.add('show');
                    } else {
                        scrollToTopBtn.classList.remove('show');
                        socialBtn.classList.remove('show');
                    }
                }
                
                // Слушаем событие скролла
                window.addEventListener('scroll', checkScrollPosition);
                
                // Обработчик для кнопки "Наверх"
                scrollToTopBtn.addEventListener('click', function() {
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth' // Плавная прокрутка
                    });
                });
                
                // Проверяем позицию при загрузке страницы
                checkScrollPosition();
            });
        </script>
