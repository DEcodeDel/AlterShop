            <img class="logo-img" src="img/logo.png" height="80px" alt="logo-img">
            <a href="index.html"><img class="logo-txt" src="img/AlterShop.png" height="60px" alt="logo-txt"></a>
        </div>
        <div class="head-2">
            <nav class="navbar">
                <a class="text-nav" style="padding-right: 5px;padding-left: 5px;" href="index.html">Актуальное</a>
                <div class="dropdown">

                </div>
                <div class="dropdown">
                    <span class="text-nav dropdown-toggle">Облики</span>
                    <div class="dropdown-menu-custom">

                    </div>
                </div>
                <a class="text-nav" href="Крылья.html">Крылья</a>
                <a class="text-nav" href="Аксессуары.html">Аксессуары</a>

    <h1>🛒 Корзина</h1>

    <main class="container">
        <div id="cartContent"></div>
    </main>

    <footer class="footer">
        &copy; AlterShop
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('alterCart') || '[]');
            const container = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>🛒 Корзина пуста</p>
                        <a href="index.html">Вернуться к покупкам</a>
                    </div>
                `;
                return;
            }
            
            let total = 0;
            let itemsHtml = '';
            
            cart.forEach((item, index) => {
                total += item.price;
                itemsHtml += `
                    <div class="cart-item">
                        <img class="cart-item-img" src="${item.img}" alt="${item.title}" onerror="this.src='img/gift.png'">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">${item.price} ₽</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <div class="cart-page">
                    <div class="cart-header">
                        <h2>📋 Ваш заказ</h2>
                        <p>${cart.length} товар(ов) на сумму ${total} ₽</p>
                    </div>
                    <div class="cart-items">
                        ${itemsHtml}
                    </div>
                    <div class="cart-summary">
                        <div class="cart-total">💰 Итого: ${total} ₽</div>
                        <button class="btn-copy" onclick="copyOrderList()">
                            📋 Скопировать список заказа
                        </button>
                        <a href="https://t.me/sfchkk03" target="_blank" class="btn-telegram">
                            📱 Оформить заказ в Telegram
                        </a>
                        <div>
                            <button class="clear-cart" onclick="clearCart()">
                                🗑️ Очистить корзину
                            </button>
                        </div>
                        <div class="cart-note">
                            💡 <strong>Как оформить заказ:</strong><br>
                            1. Нажмите «Скопировать список заказа»<br>
                            2. Перейдите в Telegram по ссылке выше<br>
                            3. Вставьте скопированный текст и отправьте
                        </div>
                    </div>
                </div>
            `;
        }
        
        function copyOrderList() {
            const cart = JSON.parse(localStorage.getItem('alterCart') || '[]');
            
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            
            let message = '🛒 НОВЫЙ ЗАКАЗ\n\n';
            let total = 0;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.title} — ${item.price} ₽\n`;
                total += item.price;
            });
            
            message += `\n💰 ИТОГО: ${total} ₽\n\n📱 Свяжитесь со мной для оформления заказа`;
            
            navigator.clipboard.writeText(message).then(() => {
                alert('✅ Список заказа скопирован!\n\nОткройте Telegram и отправьте сообщение продавцу.');
            }).catch(() => {
                alert('❌ Не удалось скопировать. Попробуйте скопировать вручную.');
            });
        }
        
        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('alterCart') || '[]');
            const removedItem = cart[index];
            cart.splice(index, 1);
            localStorage.setItem('alterCart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
            showNotification(`"${removedItem.title}" удалён из корзины`);
        }
        
        function clearCart() {
            if (confirm('Вы уверены, что хотите очистить корзину?')) {
                localStorage.setItem('alterCart', '[]');
                renderCart();
                updateCartCount();
                showNotification('Корзина очищена');
            }
        }
        
        renderCart();
    </script>
</body>
</html>
